[mod-setting-name]
research-rewards-show-message=Show reward message
research-rewards-grant-non-placeable=Grant non-placeable items
research-rewards-grant-non-hand-craftable=Grant non-hand-craftable items
research-rewards-grant-liquids=Grant liquid containers
research-rewards-stack-fraction=Stack fraction (%)

[mod-setting-description]
research-rewards-show-message=Show a chat message listing the items granted when research completes.
research-rewards-grant-non-placeable=Also grant items that cannot be placed in the world (e.g. intermediate components, modules). Disable to only grant buildings and tiles.
research-rewards-grant-non-hand-craftable=Also grant items that cannot be crafted by hand in your inventory (e.g. items requiring assembly machines or chemical plants). Disable to only grant items the player can craft directly.
research-rewards-grant-liquids=Grant filled containers for fluids unlocked by research. Uses barrels for vanilla fluids, and the appropriate container type for modded fluids (e.g. Angels gas canisters).
research-rewards-stack-fraction=Percentage of a full stack to grant per item. 100 gives a full stack, 50 gives half a stack, 200 gives two full stacks.
